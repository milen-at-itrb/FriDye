name: Daily Teams Colour

on:
  schedule:
    - cron: "0 9 * * 2"
  workflow_dispatch:

jobs:
  post-colour:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Post daily colour
        run: node colour.js
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}